apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP
      name: http
  loadBalancerClass: internal
  loadBalancerIP: 10.0.0.1
  selector:
    app.kubernetes.io/name: {{ .Release.Name }}
